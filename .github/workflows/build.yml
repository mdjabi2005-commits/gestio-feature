name: Build Sign and Release Gestio

on:
  push:
    branches:
      - main          # Build automatique a chaque push sur main (sans release)
    tags:
      - "v*.*.*"      # Build + Release sur les tags versionnés
  workflow_dispatch:  # Lancement manuel depuis l'onglet Actions sur GitHub

permissions:
  contents: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "GestioV4"
  AZURE_VAULT_URI: ${{ secrets.AZURE_VAULT_URI }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  CERT_NAME: gestio-codesign
  TIMESTAMP_URL: http://timestamp.digicert.com

jobs:

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: GestioV4-Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --no-dev --group build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend (Production)
        run: |
          cd frontend
          npm install
          npm run build
          # Remarque : on build ici pour que l'installateur contienne le dossier 'out'
          # Cela permet à l'utilisateur final de ne pas avoir Node.js installé.

      - name: Package Universal Mac/Linux Archive
        shell: bash
        run: |
          mkdir release-universal
          cp -r backend release-universal/
          mkdir -p release-universal/frontend
          cp -r frontend/out release-universal/frontend/out
          mkdir -p release-universal/distribution
          cp pyproject.toml uv.lock release-universal/
          cp distribution/launcher.py distribution/launcher.bat distribution/launcher.sh release-universal/distribution/
          python -c "import shutil; shutil.make_archive('Gestio-Universal', 'zip', 'release-universal')"

      - name: Upload Universal artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: GestioV4-Universal
          path: Gestio-Universal.zip
          if-no-files-found: error

      - name: Inno Setup installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Installer Inno Setup via choco si besoin (souvent déjà présent sur windows-latest)
          # choco install innosetup --no-progress --yes

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" distribution/gestio.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/installer/Gestio-Setup-*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_action
        if: github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Set Tag Name
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=${{ steps.tag_action.outputs.new_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: GestioV4-Windows
          path: ./release

      - name: Download Universal artifact
        uses: actions/download-artifact@v4
        with:
          name: GestioV4-Universal
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Gestio ${{ steps.vars.outputs.tag }}"
          body: |
            ## Gestio ${{ steps.vars.outputs.tag }}

            🚀 **Release Automatique** (Générée lors du push sur main)

            | Plateforme | Fichier | Instructions |
            |---|---|---|
            | Windows | `Gestio-Setup-v*.exe` | Double-cliquez sur l'assistant d'installation |
            | macOS / Linux | `Gestio-Universal.zip` | Dézippez et exécutez `bash distribution/launcher.sh` (nécessite l'outil `uv`) |

            Vos données financières sont stockées exclusivement sur votre machine locale.
          files: |
            ./release/Gestio-Setup-*.exe
            ./release/Gestio-Universal.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
